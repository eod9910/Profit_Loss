<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profit/Loss Calculator</title>
    <link rel="stylesheet" href="../vendor/bootstrap.min.css">
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-start justify-content-between gap-3">
            <div>
              <p class="eyebrow mb-1">Trading Account</p>
              <h1 class="h4 mb-0">Profit/Loss Calculator</h1>
            </div>
            <button id="resetData" class="btn btn-sm btn-outline-light" type="button">Reset</button>
          </div>

          <form id="balanceForm" class="mt-3">
            <label for="startingBalance" class="form-label">Starting account balance</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input id="startingBalance" class="form-control" type="number" min="0" step="0.01" placeholder="0.00">
              <button class="btn btn-light" type="submit">Save</button>
            </div>
          </form>
        </div>
      </section>

      <section class="summary-grid" aria-label="Account summary">
        <article class="summary-card">
          <span>Current Balance</span>
          <strong id="currentBalance">$0.00</strong>
        </article>
        <article class="summary-card">
          <span>Net P/L</span>
          <strong id="netProfitLoss">$0.00</strong>
        </article>
        <article class="summary-card">
          <span>Total Fees</span>
          <strong id="totalFees">$0.00</strong>
        </article>
        <article class="summary-card">
          <span>Trades</span>
          <strong id="tradeCount">0</strong>
        </article>
      </section>

      <section class="card shadow-sm">
        <div class="card-body">
          <h2 class="h6 mb-3">Add Round Trip</h2>
          <form id="tradeForm" class="trade-form">
            <div>
              <label for="tradeDate" class="form-label">Date</label>
              <input id="tradeDate" class="form-control" type="date" required>
            </div>
            <div>
              <label for="tradeSymbol" class="form-label">Symbol</label>
              <input id="tradeSymbol" class="form-control text-uppercase" type="text" maxlength="12" placeholder="SPY">
            </div>
            <div>
              <label for="grossProfitLoss" class="form-label">Gross P/L</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input id="grossProfitLoss" class="form-control" type="number" step="0.01" placeholder="0.00" required>
              </div>
            </div>
            <div>
              <label for="roundTripFees" class="form-label">Round-trip fees</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input id="roundTripFees" class="form-control" type="number" min="0" step="0.01" placeholder="0.00" required>
              </div>
            </div>
            <div class="form-span">
              <label for="tradeNotes" class="form-label">Notes</label>
              <input id="tradeNotes" class="form-control" type="text" maxlength="80" placeholder="Optional setup, broker, or comment">
            </div>
            <button class="btn btn-primary form-span" type="submit">Add Trade</button>
          </form>
        </div>
      </section>

      <section class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
            <h2 class="h6 mb-0">Weekly Totals</h2>
            <select id="weekSort" class="form-select form-select-sm week-sort" aria-label="Sort weekly totals">
              <option value="date-desc">Newest week</option>
              <option value="date-asc">Oldest week</option>
              <option value="net-desc">Highest net P/L</option>
              <option value="net-asc">Lowest net P/L</option>
            </select>
          </div>
          <div id="weeklyTotals" class="weekly-list" aria-live="polite"></div>
        </div>
      </section>

      <section class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
            <h2 class="h6 mb-0">Trade Log</h2>
            <button id="exportCsv" class="btn btn-sm btn-outline-secondary" type="button">Export CSV</button>
          </div>
          <div id="tradeLog" class="trade-log" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script src="./popup.js" type="module"></script>
  </body>
</html>
